<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AmneziaWG VPN Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f1117;
            color: #e1e4e8;
            min-height: 100vh;
            padding: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 28px;
            color: #58a6ff;
            margin-bottom: 5px;
        }
        .header .subtitle {
            color: #8b949e;
            font-size: 14px;
        }
        .update-info {
            text-align: center;
            color: #8b949e;
            font-size: 12px;
            margin-bottom: 20px;
        }
        .update-info .time { color: #58a6ff; }
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
            max-width: 1200px;
            margin-left: auto;
            margin-right: auto;
        }
        .card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
        }
        .card .label {
            color: #8b949e;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        .card .value {
            font-size: 28px;
            font-weight: 700;
        }
        .card .value.green { color: #3fb950; }
        .card .value.blue { color: #58a6ff; }
        .card .value.yellow { color: #d29922; }
        .card .value.red { color: #f85149; }
        .card .detail {
            color: #8b949e;
            font-size: 12px;
            margin-top: 5px;
        }
        .server-status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 28px;
            font-weight: 700;
        }
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
        }
        .status-dot.online { background: #3fb950; box-shadow: 0 0 8px #3fb950; }
        .status-dot.offline { background: #f85149; box-shadow: 0 0 8px #f85149; }
        .controls {
            max-width: 1200px;
            margin: 0 auto 15px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .search-box {
            flex: 1;
            min-width: 200px;
            padding: 10px 15px;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            color: #e1e4e8;
            font-size: 14px;
            outline: none;
        }
        .search-box:focus { border-color: #58a6ff; }
        .filter-btn {
            padding: 10px 18px;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            color: #8b949e;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        .filter-btn:hover, .filter-btn.active {
            background: #1f2937;
            border-color: #58a6ff;
            color: #58a6ff;
        }
        .table-container {
            max-width: 1200px;
            margin: 0 auto;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: #161b22;
            border-radius: 10px;
            overflow: hidden;
        }
        th {
            background: #1c2128;
            padding: 12px 15px;
            text-align: left;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #8b949e;
            cursor: pointer;
            user-select: none;
            white-space: nowrap;
        }
        th:hover { color: #58a6ff; }
        th .sort-arrow { margin-left: 4px; font-size: 10px; }
        td {
            padding: 10px 15px;
            border-top: 1px solid #21262d;
            font-size: 14px;
            white-space: nowrap;
        }
        tr:hover td { background: #1c2128; }
        .peer-status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }
        .peer-status.online {
            background: rgba(63, 185, 80, 0.15);
            color: #3fb950;
        }
        .peer-status.recent {
            background: rgba(210, 153, 34, 0.15);
            color: #d29922;
        }
        .peer-status.offline {
            background: rgba(139, 148, 158, 0.1);
            color: #8b949e;
        }
        .peer-name { font-weight: 600; color: #e1e4e8; }
        .peer-ip { color: #8b949e; font-family: monospace; font-size: 13px; }
        .traffic { font-family: monospace; font-size: 13px; }
        .traffic .rx { color: #3fb950; }
        .traffic .tx { color: #58a6ff; }
        .endpoint { color: #8b949e; font-family: monospace; font-size: 12px; }
        .loading {
            text-align: center;
            padding: 60px;
            color: #8b949e;
        }
        .loading .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #30363d;
            border-top-color: #58a6ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error-msg {
            text-align: center;
            padding: 40px;
            color: #f85149;
            background: rgba(248, 81, 73, 0.1);
            border-radius: 10px;
            margin: 20px auto;
            max-width: 600px;
        }
        .progress-bar {
            max-width: 1200px;
            margin: 0 auto 5px;
            height: 2px;
            background: #30363d;
            border-radius: 1px;
            overflow: hidden;
        }
        .progress-bar .fill {
            height: 100%;
            background: #58a6ff;
            border-radius: 1px;
            transition: width 1s linear;
        }
        @media (max-width: 768px) {
            body { padding: 10px; }
            .header h1 { font-size: 22px; }
            .cards { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .card .value { font-size: 22px; }
            td, th { padding: 8px 10px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>AmneziaWG VPN Dashboard</h1>
        <div class="subtitle">89.125.82.69</div>
    </div>

    <div class="update-info">
        Обновлено: <span class="time" id="updated-at">загрузка...</span>
        &nbsp;|&nbsp; Следующее обновление через <span id="countdown">-</span>с
    </div>
    <div class="progress-bar"><div class="fill" id="progress-fill"></div></div>

    <div class="cards" id="server-cards">
        <div class="card">
            <div class="label">Сервер</div>
            <div class="value" id="server-status"><div class="loading"><div class="spinner"></div></div></div>
        </div>
        <div class="card">
            <div class="label">Активных</div>
            <div class="value green" id="active-peers">-</div>
            <div class="detail" id="total-peers">из -</div>
        </div>
        <div class="card">
            <div class="label">Uptime</div>
            <div class="value blue" id="server-uptime">-</div>
        </div>
        <div class="card">
            <div class="label">RAM</div>
            <div class="value blue" id="server-ram">-</div>
            <div class="detail" id="server-ram-detail">-</div>
        </div>
        <div class="card">
            <div class="label">Диск</div>
            <div class="value blue" id="server-disk">-</div>
            <div class="detail" id="server-disk-detail">-</div>
        </div>
        <div class="card">
            <div class="label">Нагрузка</div>
            <div class="value blue" id="server-load">-</div>
        </div>
    </div>

    <div class="controls">
        <input type="text" class="search-box" id="search" placeholder="Поиск по имени...">
        <button class="filter-btn active" data-filter="all">Все</button>
        <button class="filter-btn" data-filter="online">Online</button>
        <button class="filter-btn" data-filter="recent">Недавно</button>
        <button class="filter-btn" data-filter="offline">Offline</button>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th data-sort="name">Имя <span class="sort-arrow"></span></th>
                    <th data-sort="ip">IP <span class="sort-arrow"></span></th>
                    <th data-sort="status">Статус <span class="sort-arrow"></span></th>
                    <th data-sort="handshake">Handshake <span class="sort-arrow"></span></th>
                    <th data-sort="rx">Трафик</th>
                    <th data-sort="endpoint">Endpoint <span class="sort-arrow"></span></th>
                </tr>
            </thead>
            <tbody id="peers-table">
                <tr><td colspan="6" class="loading"><div class="spinner"></div>Загрузка...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        let allPeers = [];
        let currentFilter = 'all';
        let currentSort = { key: 'status', dir: 'asc' };
        let refreshInterval = 60;
        let countdown = refreshInterval;

        async function loadData() {
            try {
                const resp = await fetch('data/status.json?' + Date.now());
                if (!resp.ok) throw new Error('HTTP ' + resp.status);
                const data = await resp.json();
                renderServer(data.server);
                allPeers = data.peers || [];
                renderPeers();
                document.getElementById('updated-at').textContent = formatDate(data.updated_at);
                countdown = refreshInterval;
            } catch (e) {
                document.getElementById('peers-table').innerHTML =
                    '<tr><td colspan="6" class="error-msg">Ошибка загрузки данных: ' + e.message + '</td></tr>';
            }
        }

        function renderServer(s) {
            if (!s) return;
            const statusEl = document.getElementById('server-status');
            const isOnline = s.status === 'online';
            statusEl.innerHTML = '<div class="server-status"><span class="status-dot ' +
                (isOnline ? 'online' : 'offline') + '"></span>' +
                (isOnline ? 'Online' : 'Offline') + '</div>';
            statusEl.className = 'value ' + (isOnline ? 'green' : 'red');

            document.getElementById('active-peers').textContent = s.active_peers;
            document.getElementById('total-peers').textContent = 'из ' + s.total_peers;
            document.getElementById('server-uptime').textContent = s.uptime;

            const ramPct = Math.round(s.ram_used_mb / s.ram_total_mb * 100);
            document.getElementById('server-ram').textContent = ramPct + '%';
            document.getElementById('server-ram-detail').textContent = s.ram_used_mb + ' / ' + s.ram_total_mb + ' MB';
            document.getElementById('server-ram').className = 'value ' + (ramPct > 80 ? 'red' : ramPct > 60 ? 'yellow' : 'blue');

            const diskPct = Math.round(s.disk_used_gb / s.disk_total_gb * 100);
            document.getElementById('server-disk').textContent = diskPct + '%';
            document.getElementById('server-disk-detail').textContent = s.disk_used_gb + ' / ' + s.disk_total_gb + ' GB';
            document.getElementById('server-disk').className = 'value ' + (diskPct > 80 ? 'red' : diskPct > 60 ? 'yellow' : 'blue');

            document.getElementById('server-load').textContent = s.load;
        }

        function renderPeers() {
            const search = document.getElementById('search').value.toLowerCase();
            let filtered = allPeers.filter(p => {
                if (search && !p.name.toLowerCase().includes(search)) return false;
                if (currentFilter === 'online') return p.status === 'online';
                if (currentFilter === 'recent') return p.status === 'recent';
                if (currentFilter === 'offline') return p.status === 'offline';
                return true;
            });

            filtered.sort((a, b) => {
                let va, vb;
                switch (currentSort.key) {
                    case 'name': va = a.name; vb = b.name; break;
                    case 'ip': va = ipToNum(a.ip); vb = ipToNum(b.ip); return currentSort.dir === 'asc' ? va - vb : vb - va;
                    case 'status': va = statusOrder(a.status); vb = statusOrder(b.status); return currentSort.dir === 'asc' ? va - vb : vb - va;
                    case 'handshake': va = a.handshake_seconds; vb = b.handshake_seconds; return currentSort.dir === 'asc' ? va - vb : vb - va;
                    case 'rx': va = parseTraffic(a.transfer_rx); vb = parseTraffic(b.transfer_rx); return currentSort.dir === 'asc' ? va - vb : vb - va;
                    default: va = a.name; vb = b.name;
                }
                if (typeof va === 'string') {
                    return currentSort.dir === 'asc' ? va.localeCompare(vb) : vb.localeCompare(va);
                }
                return currentSort.dir === 'asc' ? va - vb : vb - va;
            });

            const tbody = document.getElementById('peers-table');
            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#8b949e;padding:30px;">Нет результатов</td></tr>';
                return;
            }

            tbody.innerHTML = filtered.map(p => `
                <tr>
                    <td class="peer-name">${esc(p.name)}</td>
                    <td class="peer-ip">${esc(p.ip)}</td>
                    <td><span class="peer-status ${p.status}">
                        <span class="status-dot ${p.status}"></span>
                        ${p.status === 'online' ? 'Online' : p.status === 'recent' ? 'Недавно' : 'Offline'}
                    </span></td>
                    <td>${esc(p.latest_handshake)}</td>
                    <td class="traffic"><span class="rx">${esc(p.transfer_rx)}</span> / <span class="tx">${esc(p.transfer_tx)}</span></td>
                    <td class="endpoint">${esc(p.endpoint || '-')}</td>
                </tr>
            `).join('');
        }

        function statusOrder(s) { return s === 'online' ? 0 : s === 'recent' ? 1 : 2; }
        function ipToNum(ip) { return ip.split('.').reduce((a, b) => a * 256 + parseInt(b), 0); }
        function parseTraffic(t) {
            if (!t) return 0;
            const m = t.match(/([\d.]+)\s*(B|KiB|MiB|GiB|TiB)/);
            if (!m) return 0;
            const units = { B: 1, KiB: 1024, MiB: 1048576, GiB: 1073741824, TiB: 1099511627776 };
            return parseFloat(m[1]) * (units[m[2]] || 0);
        }
        function esc(s) { const d = document.createElement('div'); d.textContent = s || '-'; return d.innerHTML; }
        function formatDate(iso) {
            if (!iso) return '-';
            const d = new Date(iso);
            return d.toLocaleString('ru-RU', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }

        // Event listeners
        document.getElementById('search').addEventListener('input', renderPeers);

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                renderPeers();
            });
        });

        document.querySelectorAll('th[data-sort]').forEach(th => {
            th.addEventListener('click', () => {
                const key = th.dataset.sort;
                if (currentSort.key === key) {
                    currentSort.dir = currentSort.dir === 'asc' ? 'desc' : 'asc';
                } else {
                    currentSort = { key, dir: 'asc' };
                }
                document.querySelectorAll('th .sort-arrow').forEach(a => a.textContent = '');
                th.querySelector('.sort-arrow').textContent = currentSort.dir === 'asc' ? ' ▲' : ' ▼';
                renderPeers();
            });
        });

        // Countdown & auto-refresh
        setInterval(() => {
            countdown--;
            document.getElementById('countdown').textContent = Math.max(0, countdown);
            document.getElementById('progress-fill').style.width = ((refreshInterval - countdown) / refreshInterval * 100) + '%';
            if (countdown <= 0) {
                loadData();
            }
        }, 1000);

        // Initial load
        loadData();
    </script>
</body>
</html>
